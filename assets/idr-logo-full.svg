  <line x1="98" y1="50" x2="212" y2="50" stroke="#FF6B1A" stroke-width="2" />
  <text x="98" y="66" font-family="'Manrope', 'Segoe UI', Arial, sans-serif" font-size="9" font-weight="600" letter-spacing="0.1em" fill="#BEBEBE">INSTITUTE OF DIGITAL RISK</text>
